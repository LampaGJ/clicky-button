<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clicky Button — Flexbox Playground</title>
  <style>
    :root {
      --ink: #1a1a1a; --muted: #6b6b6b; --line: #d9d6d0; --bg: #f4f1ed;
      --panel: #ffffff; --accent: #5b8dee;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--ink); background: var(--bg); }
    header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; padding: 14px 22px; border-bottom: 1px solid var(--line); }
    header h1 { font-size: 17px; margin: 0; }
    header .sub { font-size: 12px; color: var(--muted); }
    header a { font-size: 12px; color: var(--accent); text-decoration: none; margin-left: auto; }

    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 52px); }
    .controls { padding: 18px 20px; border-right: 1px solid var(--line); background: var(--panel); }
    .controls h2 { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin: 0 0 4px; }
    .ctrl { margin: 14px 0; }
    .ctrl > label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
    .ctrl select, .ctrl input[type=range] { width: 100%; }
    .ctrl select { padding: 5px 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 13px; }
    .ctrl .val { float: right; font-weight: 400; color: var(--muted); font-variant-numeric: tabular-nums; }
    .hint { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

    .stage-wrap { padding: 22px; overflow: auto; }
    .stage-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    /* The resizable flex container the user is configuring. This IS the demo:
       real CSS flexbox, buttons taking up the space. */
    #stage {
      background:
        linear-gradient(90deg, rgba(91,141,238,.04) 0 0),
        repeating-linear-gradient(45deg, #ecece6 0 10px, #f4f1ed 10px 20px);
      border: 2px dashed #c3bfb6;
      border-radius: 10px;
      resize: both; overflow: auto;
      display: flex; /* JS overrides the individual flex props */
      padding: 14px;
      min-width: 160px; min-height: 90px;
    }
    /* Button fill modes — how each exported button (.btn-scale) takes space. */
    #stage.fill-natural .btn-scale { flex: 0 0 auto; }        /* authored size, never squished */
    #stage.fill-grow    .btn-scale { flex: 1 1 0; }           /* share the main axis equally */
    #stage.fill-stretch .btn-scale { flex: 1 1 0; align-self: stretch; height: auto; } /* fill both axes */
    #stage.fill-stretch { align-items: stretch; }

    .code { margin-top: 16px; background: #1e1e22; color: #d7d7db; border-radius: 8px; padding: 12px 14px; font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre; overflow-x: auto; }
    .code .k { color: #c586c0; } .code .p { color: #9cdcfe; } .code .v { color: #ce9178; }
  </style>
</head>
<body>
  <header>
    <h1>Clicky Button — Flexbox Playground</h1>
    <span class="sub">the exported button fills whatever flex space you give it, at any size &amp; ratio</span>
    <a href="index.html">← Generator</a>
  </header>

  <div class="layout">
    <aside class="controls">
      <h2>Flex container</h2>
      <div class="ctrl"><label>flex-direction</label>
        <select id="c-dir">
          <option>row</option><option>row-reverse</option><option>column</option><option>column-reverse</option>
        </select></div>
      <div class="ctrl"><label>justify-content</label>
        <select id="c-justify">
          <option>flex-start</option><option selected>center</option><option>flex-end</option>
          <option>space-between</option><option>space-around</option><option>space-evenly</option>
        </select></div>
      <div class="ctrl"><label>align-items</label>
        <select id="c-align">
          <option>stretch</option><option selected>center</option><option>flex-start</option><option>flex-end</option>
        </select></div>
      <div class="ctrl"><label>flex-wrap</label>
        <select id="c-wrap"><option>nowrap</option><option selected>wrap</option><option>wrap-reverse</option></select></div>
      <div class="ctrl"><label>gap <span class="val" id="v-gap">16px</span></label>
        <input type="range" id="c-gap" min="0" max="60" value="16"></div>

      <h2 style="margin-top:22px">The button</h2>
      <div class="ctrl"><label>fill mode</label>
        <select id="c-fill">
          <option value="natural">natural — authored size</option>
          <option value="grow" selected>grow — share main axis</option>
          <option value="stretch">stretch — fill both axes</option>
        </select>
        <div class="hint" id="fill-hint"></div></div>
      <div class="ctrl"><label>material</label>
        <select id="c-mat"><option>plastic</option><option>metal</option><option>glass</option><option>rubber</option></select></div>
      <div class="ctrl"><label>count <span class="val" id="v-count">3</span></label>
        <input type="range" id="c-count" min="1" max="6" value="3"></div>

      <div class="hint" style="margin-top:18px">Drag the ⌟ corner of the stage to resize it — the buttons re-flow live. That's the whole point: no regeneration, any size, any ratio.</div>
    </aside>

    <main class="stage-wrap">
      <div class="stage-meta" id="meta"></div>
      <div id="stage" class="fill-grow"></div>
      <div class="code" id="code"></div>
    </main>
  </div>

  <script type="module">
    import { defaultClickyConfig, buildClickyCss, buildClickyHtml } from './lib/clicky-button.js';

    // Material presets (verbatim subset from app.js — gallery imports only the engine).
    const MATERIAL_PRESETS = {
      plastic: { radiusRatio: 14, faceColor: '#e6e6ea', textColor: '#1a1a1a', wallHRatio: 8, pressDepthRatio: 10, pressDarken: 10, insetDepthRatio: 5, insetBlurRatio: 4, insetAlphaTop: 65, insetAlphaBot: 35, faceEdgeAlpha: 15, highlightOpacity: 35, rimHeightRatio: 6, buttonWallShadowAlpha: 90, buttonWallShadowEdgeRatio: 60, buttonWallGradientSpread: 10, cavityWallShadowAlpha: 90, cavityWallShadowEdgeRatio: 60, cavityWallGradientSpread: 10, ambientIntensity: 20, ambientBlurMult: 2.0, ambientYMult: 1.0, frameEnabled: true, frameWidth: 8, duration: 90, pressDuration: 50, easingPreset: 'snappy', specularAlpha: 20, specularSize: 40, contactIntensity: 10 },
      metal:   { radiusRatio: 10, faceColor: '#b0b8c0', textColor: '#12161a', wallHRatio: 12, pressDepthRatio: 14, pressDarken: 14, insetDepthRatio: 6, insetBlurRatio: 6, insetAlphaTop: 60, insetAlphaBot: 30, faceEdgeAlpha: 10, highlightColor: '#eef3f8', highlightOpacity: 25, rimHeightRatio: 6, buttonWallShadowAlpha: 90, buttonWallShadowEdgeRatio: 65, useCavityWallColor: true, cavityWallColor: '#9aa4ad', ambientIntensity: 20, ambientBlurMult: 1.5, frameEnabled: true, frameWidth: 14, frameColorHi: '#eef2f6', frameColor: '#9aa4ad', frameColorLo: '#5b6670', frameBevelAlpha: 70, frameBevelWidth: 2, duration: 130, pressDuration: 70, easingPreset: 'black', specularAlpha: 12, specularSize: 30, contactIntensity: 15 },
      glass:   { radiusRatio: 22, faceColor: '#eaf6fb', textColor: '#1a2a33', wallHRatio: 14, pressDepthRatio: 16, pressDarken: 8, insetDepthRatio: 8, insetBlurRatio: 14, insetAlphaTop: 20, insetAlphaBot: 10, highlightOpacity: 45, rimHeightRatio: 10, buttonWallShadowAlpha: 35, buttonWallGradientSpread: 55, ambientIntensity: 15, ambientBlurMult: 4.0, frameEnabled: true, frameWidth: 8, frameBevelAlpha: 30, duration: 150, pressDuration: 80, easingPreset: 'clear', specularAlpha: 55, specularSize: 80, contactIntensity: 10 },
      rubber:  { radiusRatio: 30, faceColor: '#3f4142', textColor: '#e8e8e8', wallHRatio: 22, pressDepthRatio: 24, pressDarken: 18, insetDepthRatio: 10, insetBlurRatio: 20, insetAlphaTop: 40, insetAlphaBot: 20, highlightOpacity: 15, rimHeightRatio: 10, buttonWallShadowAlpha: 60, buttonWallGradientSpread: 40, ambientIntensity: 25, ambientBlurMult: 4.5, ambientYMult: 2.0, frameEnabled: false, duration: 260, pressDuration: 140, easingPreset: 'soft', specularAlpha: 8, specularSize: 70, contactIntensity: 20 },
    };
    const LABELS = ['PLAY', 'STOP', 'REC', 'PREV', 'NEXT', 'MENU'];
    const FILL_HINTS = {
      natural: 'flex: 0 0 auto — keeps its designed size, never squished.',
      grow:    'flex: 1 1 0 — every button shares the main axis equally.',
      stretch: 'flex: 1 1 0 + align-self: stretch — fills both axes (any ratio).',
    };

    const $ = id => document.getElementById(id);
    const stage = $('stage');
    let styleEl = null;

    function rebuild() {
      const mat = $('c-mat').value;
      const count = +$('c-count').value;
      const config = { ...defaultClickyConfig, ...MATERIAL_PRESETS[mat], containerWidth: 150, containerHeight: 72 };
      // One scoped stylesheet for every demo button (same config).
      const css = buildClickyCss(config, { scope: '#stage' });
      if (styleEl) styleEl.remove();
      styleEl = document.createElement('style');
      styleEl.textContent = css;
      document.head.appendChild(styleEl);
      stage.innerHTML = Array.from({ length: count }, (_, i) =>
        buildClickyHtml({ label: LABELS[i % LABELS.length], config })).join('');
      applyFlex();
    }

    function applyFlex() {
      const dir = $('c-dir').value, justify = $('c-justify').value, align = $('c-align').value,
            wrap = $('c-wrap').value, gap = +$('c-gap').value, fill = $('c-fill').value;
      Object.assign(stage.style, { flexDirection: dir, justifyContent: justify, alignItems: align, flexWrap: wrap, gap: gap + 'px' });
      stage.className = 'fill-' + fill;
      $('v-gap').textContent = gap + 'px';
      $('v-count').textContent = $('c-count').value;
      $('fill-hint').textContent = FILL_HINTS[fill];
      $('meta').textContent = `stage ${Math.round(stage.clientWidth)}×${Math.round(stage.clientHeight)}px — resize the corner ⌟ to watch the buttons re-flow`;
      const fillCss = { natural: 'flex: 0 0 auto;', grow: 'flex: 1 1 0;', stretch: 'flex: 1 1 0;\n  align-self: stretch;' }[fill];
      $('code').innerHTML =
`<span class="k">.your-container</span> {
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">flex-direction</span>: <span class="v">${dir}</span>;
  <span class="p">justify-content</span>: <span class="v">${justify}</span>;
  <span class="p">align-items</span>: <span class="v">${align}</span>;
  <span class="p">flex-wrap</span>: <span class="v">${wrap}</span>;
  <span class="p">gap</span>: <span class="v">${gap}px</span>;
}
<span class="k">.your-container .btn-scale</span> {   <span class="p">/* the exported button fills its space */</span>
  ${fillCss.replace(/\n/g, '\n  ')}
}`;
    }

    ['c-dir','c-justify','c-align','c-wrap'].forEach(id => $(id).addEventListener('change', applyFlex));
    $('c-gap').addEventListener('input', applyFlex);
    $('c-fill').addEventListener('change', applyFlex);
    ['c-mat','c-count'].forEach(id => $(id).addEventListener('input', rebuild));
    // Live meta update as the user drags the resize handle.
    new ResizeObserver(applyFlex).observe(stage);

    rebuild();
    stage.style.width = '640px'; stage.style.height = '260px';
  </script>
</body>
</html>
