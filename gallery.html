<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clicky Button Gallery</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0">
  <style>
    /* ── Page chrome ───────────────────────────────────────────────
       Standalone: gallery.html does NOT import styles.css. These are
       the handful of design tokens copied verbatim from styles.css's
       :root block so the page reads as part of the same dark app. */
    :root {
      --app-bg:         #111213;
      --panel-bg:       #1a1c1e;
      --panel-border:   #2a2d31;
      --text-primary:   #e8eaed;
      --text-secondary: #9aa0a6;
      --accent:         #5b8dee;
      --accent-hover:   #7ba5f3;
      --ctrl-bg:        #2a2d31;
      --ctrl-border:    #3c4043;
      --radius-sm:      6px;
      --radius-md:      10px;
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--app-bg);
      color: var(--text-primary);
      font-family: var(--font-ui);
    }

    .gallery-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
      padding: 16px clamp(16px, 3vw, 32px);
      background: var(--panel-bg);
      border-bottom: 1px solid var(--panel-border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .gallery-header h1 {
      font-size: 17px;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .gallery-header a.back-link {
      display: inline-flex;
      align-items: center;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border: 1px solid var(--ctrl-border);
      border-radius: 99px;
      background: var(--ctrl-bg);
      transition: color 140ms ease, border-color 140ms ease;
    }

    .gallery-header a.back-link:hover {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .gallery-note {
      color: var(--text-secondary);
      font-size: 12px;
      margin-left: auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: clamp(16px, 3vw, 32px);
    }

    /* ── Tile wrapper ─────────────────────────────────────────────
       Per the stacking-context-debugger's perf contract on issue #28:
       - content-visibility + contain-intrinsic-size go HERE (one level
         above .btn-housing), not on .btn-cell (already contained).
       - isolation:isolate is added ONLY because this wrapper also draws
         gallery-only chrome (the caption) outside .btn-cell's clip —
         the documented exception to "don't add isolation on the tile". */
    .gallery-tile {
      content-visibility: auto;
      contain-intrinsic-size: 220px 110px;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 180px;
      padding: 24px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--panel-border);
    }

    .tile-caption {
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.45;
      text-align: center;
      font-family: var(--font-ui);
      max-width: 100%;
    }

    .tile-caption b {
      color: var(--text-primary);
      font-weight: 600;
    }

    .gallery-footer {
      padding: 12px clamp(16px, 3vw, 32px) 32px;
      color: var(--text-secondary);
      font-size: 11px;
    }

    .gallery-footer a { color: var(--accent); }
  </style>

  <!-- Exactly one <style> element holds the whole generated button
       stylesheet (all tiles concatenated into one textContent write) —
       per the stacking-context-debugger's mitigation (b)2 on issue #28. -->
  <style id="gallery-css"></style>
</head>
<!-- ontouchstart="" enables :active on iOS Safari without any JS overhead -->
<body ontouchstart="">
  <header class="gallery-header">
    <h1>Clicky Button Gallery</h1>
    <a class="back-link" href="index.html">&larr; Back to generator</a>
    <span class="gallery-note" id="tile-count-note"></span>
  </header>

  <main class="gallery-grid" id="gallery-grid"></main>

  <footer class="gallery-footer">
    QA/showcase surface generated from <code>lib/clicky-button.js</code> — see
    <a href="https://github.com/LampaGJ/clicky-button/issues/28" target="_blank" rel="noopener">issue #28</a>
    for the variation-matrix and performance contract this page follows.
  </footer>

  <script type="module">
    import {
      defaultClickyConfig,
      buildClickyCss,
      buildClickyHtml,
      buildClickyGroupHtml,
      internals,
    } from './lib/clicky-button.js';

    // ── Material presets ─────────────────────────────────────────
    // Pasted VERBATIM from app.js's MATERIAL_PRESETS (issue #19 sign-off
    // data, referenced by issue #28's illusion-designer comment). Do not
    // invent replacements — this is intentionally duplicated data, not an
    // import, because gallery.html only imports lib/clicky-button.js
    // (app.js is the generator's own wiring, not a reusable module).
    const MATERIAL_PRESETS = {
      rubber: {
        radiusRatio: 30, chromeRadiusRatio: 20, faceColor: '#3f4142', textColor: '#e8e8e8',
        wallHRatio: 22, pressDepthRatio: 30, pressDarken: 18,
        insetDepthRatio: 10, insetBlurRatio: 20, insetAlphaTop: 40, insetAlphaBot: 20, faceEdgeAlpha: 5,
        topHighlight: true, highlightColor: '#ffffff', highlightOpacity: 15, rimHeightRatio: 10,
        buttonWallShadowAlpha: 60, buttonWallShadowEdgeRatio: 35, buttonWallGradientSpread: 40,
        cavityWallShadowAlpha: 60, cavityWallShadowEdgeRatio: 35, cavityWallGradientSpread: 40,
        ambientIntensity: 25, ambientBlurMult: 4.5, ambientYMult: 2.0, ambientPressReduction: 50,
        frameEnabled: false,
        duration: 260, pressDuration: 140, easingPreset: 'soft', overshoot: false,
        specularAlpha: 8, lightAngleX: 50, lightAngleY: 25, specularSize: 70,
        contactIntensity: 20,
      },
      plastic: {
        radiusRatio: 14, chromeRadiusRatio: 16, faceColor: '#e6e6ea', textColor: '#1a1a1a',
        wallHRatio: 8, pressDepthRatio: 10, pressDarken: 10,
        insetDepthRatio: 5, insetBlurRatio: 4, insetAlphaTop: 65, insetAlphaBot: 35, faceEdgeAlpha: 15,
        topHighlight: true, highlightColor: '#ffffff', highlightOpacity: 35, rimHeightRatio: 6,
        buttonWallShadowAlpha: 90, buttonWallShadowEdgeRatio: 60, buttonWallGradientSpread: 10,
        cavityWallShadowAlpha: 90, cavityWallShadowEdgeRatio: 60, cavityWallGradientSpread: 10,
        ambientIntensity: 20, ambientBlurMult: 2.0, ambientYMult: 1.0, ambientPressReduction: 50,
        frameEnabled: true, frameWidth: 6, frameBevelAlpha: 50, frameBevelWidth: 1,
        duration: 90, pressDuration: 50, easingPreset: 'snappy', overshoot: true,
        specularAlpha: 20, lightAngleX: 50, lightAngleY: 25, specularSize: 40,
        contactIntensity: 10,
      },
      metal: {
        radiusRatio: 10, chromeRadiusRatio: 14, faceColor: '#b0b8c0', textColor: '#12161a',
        wallHRatio: 12, pressDepthRatio: 14, pressDarken: 14,
        insetDepthRatio: 6, insetBlurRatio: 6, insetAlphaTop: 60, insetAlphaBot: 30, faceEdgeAlpha: 10,
        topHighlight: true, highlightColor: '#eef3f8', highlightOpacity: 25, rimHeightRatio: 6,
        buttonWallShadowAlpha: 90, buttonWallShadowEdgeRatio: 65, buttonWallGradientSpread: 15,
        useCavityWallColor: true, cavityWallColor: '#9aa4ad',
        cavityWallShadowAlpha: 90, cavityWallShadowEdgeRatio: 65, cavityWallGradientSpread: 15,
        ambientIntensity: 20, ambientBlurMult: 1.5, ambientYMult: 1.0, ambientPressReduction: 50,
        frameEnabled: true, frameWidth: 20, frameColorHi: '#eef2f6', frameColor: '#9aa4ad', frameColorLo: '#5b6670',
        frameBevelAlpha: 70, frameBevelWidth: 2,
        duration: 130, pressDuration: 70, easingPreset: 'black', overshoot: true,
        specularAlpha: 12, lightAngleX: 40, lightAngleY: 20, specularSize: 30,
        contactIntensity: 15,
      },
      glass: {
        radiusRatio: 22, chromeRadiusRatio: 18, faceColor: '#eaf6fb', textColor: '#1a2a33',
        wallHRatio: 14, pressDepthRatio: 16, pressDarken: 8,
        insetDepthRatio: 8, insetBlurRatio: 14, insetAlphaTop: 20, insetAlphaBot: 10, faceEdgeAlpha: 0,
        topHighlight: true, highlightColor: '#ffffff', highlightOpacity: 45, rimHeightRatio: 10,
        buttonWallShadowAlpha: 35, buttonWallShadowEdgeRatio: 20, buttonWallGradientSpread: 55,
        cavityWallShadowAlpha: 35, cavityWallShadowEdgeRatio: 20, cavityWallGradientSpread: 55,
        ambientIntensity: 15, ambientBlurMult: 4.0, ambientYMult: 1.75, ambientPressReduction: 50,
        frameEnabled: true, frameWidth: 8, frameBevelAlpha: 30, frameBevelWidth: 1,
        duration: 150, pressDuration: 80, easingPreset: 'clear', overshoot: true,
        specularAlpha: 55, lightAngleX: 45, lightAngleY: 20, specularSize: 80,
        contactIntensity: 10,
      },
    };

    // ── Canvas swatches (issue #28, illusion-designer comment) ────
    // Applied as each tile's OWN background, never the page background.
    const BG = { LIGHT: '#f5f5f5', DARK: '#141414', NEUTRAL: '#808080' };

    // Reads the effective value for a caption axis: the bundle's own
    // override if present, else the same default buildClickyCss would
    // merge in. Keeps every printed number pulled straight from the JSON
    // instead of hand-retyped, per the caption schema's requirement.
    function val(cfg, key) {
      return key in cfg ? cfg[key] : defaultClickyConfig[key];
    }

    // ── Variation matrix ───────────────────────────────────────────
    // Rows 1-6 verbatim from issue #28's illusion-designer comment: one
    // perceptual variable isolated per row (material → shape → size →
    // color/contrast → frame/travel → specular/mode). Row 7 added by
    // issue #38: the wave-3 shape primitives (skew, per-corner radius,
    // segmented housing, tri-state radio) landed after #28 shipped; its skew
    // tiles were expanded from one to five by issue #40 (all four directions
    // + one combined) once the shear moved to the housing level.
    const TILES = [
      // Row 1 — Materials (bg NEUTRAL): four presets, same label/icon.
      { name: 'Rubber', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.rubber, iconName: 'send', btnLabels: 'SEND' },
        axes: [{ label: 'material', literal: 'rubber' }, { label: 'icon', key: 'iconName' }, { label: 'mode', key: 'mode' }] },
      { name: 'Plastic', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, iconName: 'send', btnLabels: 'SEND' },
        axes: [{ label: 'material', literal: 'plastic' }, { label: 'icon', key: 'iconName' }, { label: 'mode', key: 'mode' }] },
      { name: 'Metal', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.metal, iconName: 'send', btnLabels: 'SEND' },
        axes: [{ label: 'material', literal: 'metal' }, { label: 'icon', key: 'iconName' }, { label: 'mode', key: 'mode' }] },
      { name: 'Glass', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.glass, iconName: 'send', btnLabels: 'SEND' },
        axes: [{ label: 'material', literal: 'glass' }, { label: 'icon', key: 'iconName' }, { label: 'mode', key: 'mode' }] },

      // Row 2 — Shape extremes (bg LIGHT): plastic base, geometry only.
      { name: 'Pill', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 200, containerHeight: 64, radiusRatio: 50, chromeRadiusRatio: 50, btnCount: 1, btnLabels: 'PILL' },
        axes: [{ label: 'shape', key: 'radiusRatio', prefix: 'radiusRatio ' }, { label: 'size', size: true }, { label: 'count', key: 'btnCount' }] },
      { name: 'Sharp', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, radiusRatio: 0, chromeRadiusRatio: 0, btnLabels: 'SHARP' },
        axes: [{ label: 'radiusRatio', key: 'radiusRatio' }, { label: 'chromeRadiusRatio', key: 'chromeRadiusRatio' }, { label: 'material', literal: 'plastic' }] },
      { name: 'Tall', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 80, containerHeight: 200, btnCount: 1, gridDirection: 'column', btnLabels: 'TALL' },
        axes: [{ label: 'size', size: true }, { label: 'count', key: 'btnCount' }, { label: 'gridDirection', key: 'gridDirection' }] },
      { name: 'Wide/Flat', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 320, containerHeight: 56, btnCount: 1, btnLabels: 'WIDE FLAT' },
        axes: [{ label: 'size', size: true }, { label: 'count', key: 'btnCount' }, { label: 'material', literal: 'plastic' }] },

      // Row 3 — Size extremes (bg LIGHT): plastic base, dimensions/density only.
      { name: 'Micro cluster', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 96, containerHeight: 48, btnCount: 4, fontSizeRatio: -20, gridGap: 4, btnLabels: 'A,B,C,D' },
        axes: [{ label: 'size', size: true }, { label: 'count', key: 'btnCount' }, { label: 'fontSizeRatio', key: 'fontSizeRatio' }] },
      { name: 'Giant single', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 280, containerHeight: 160, btnCount: 1, fontSizeRatio: 10, btnLabels: 'GIANT' },
        axes: [{ label: 'size', size: true }, { label: 'count', key: 'btnCount' }, { label: 'fontSizeRatio', key: 'fontSizeRatio' }] },
      { name: 'Dense grid', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 220, containerHeight: 140, btnCount: 9, gridWrap: 'wrap', btnLabels: '1,2,3,4,5,6,7,8,9' },
        axes: [{ label: 'size', size: true }, { label: 'count', key: 'btnCount' }, { label: 'gridWrap', key: 'gridWrap' }] },
      { name: 'Icon-only giant', bg: 'LIGHT',
        config: { ...MATERIAL_PRESETS.plastic, containerWidth: 120, containerHeight: 120, btnCount: 1, btnLabels: '', iconName: 'favorite', iconScale: 2.2 },
        axes: [{ label: 'size', size: true }, { label: 'icon', key: 'iconName' }, { label: 'iconScale', key: 'iconScale' }] },

      // Row 4 — Face color / light-dark contrast (bg varies — this row IS the bg test).
      { name: 'Light-on-light', bg: 'LIGHT',
        config: { faceColor: '#f5f5f0', textColor: '#333333', frameColor: '#e0e0e0', btnLabels: 'LIGHT' },
        axes: [{ label: 'faceColor', key: 'faceColor' }, { label: 'textColor', key: 'textColor' }, { label: 'frameColor', key: 'frameColor' }] },
      { name: 'Dark-on-dark', bg: 'DARK',
        config: { faceColor: '#1c1c1c', textColor: '#e8e8e8', frameColor: '#0a0a0a', highlightOpacity: 15, btnLabels: 'DARK' },
        axes: [{ label: 'faceColor', key: 'faceColor' }, { label: 'textColor', key: 'textColor' }, { label: 'highlightOpacity', key: 'highlightOpacity' }] },
      { name: 'Vivid color', bg: 'NEUTRAL',
        config: { faceColor: '#ff6347', textColor: '#ffffff', useButtonWallColor: true, buttonWallColor: '#d4472e', btnLabels: 'VIVID' },
        axes: [{ label: 'faceColor', key: 'faceColor' }, { label: 'buttonWallColor', key: 'buttonWallColor' }, { label: 'useButtonWallColor', key: 'useButtonWallColor' }] },
      { name: 'Colored-on-dark', bg: 'DARK',
        config: { faceColor: '#1e90ff', textColor: '#ffffff', useButtonWallColor: true, buttonWallColor: '#0f5fb0', specularAlpha: 25, btnLabels: 'ACCENT' },
        axes: [{ label: 'faceColor', key: 'faceColor' }, { label: 'buttonWallColor', key: 'buttonWallColor' }, { label: 'specularAlpha', key: 'specularAlpha' }] },

      // Row 5 — Frame & travel extremes (bg NEUTRAL).
      { name: 'Frameless flat', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, frameEnabled: false, pressDepthRatio: 6, wallHRatio: 4, btnLabels: 'FLAT' },
        axes: [{ label: 'frameEnabled', key: 'frameEnabled' }, { label: 'pressDepthRatio', key: 'pressDepthRatio' }, { label: 'wallHRatio', key: 'wallHRatio' }] },
      { name: 'Heavy frame', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.metal, frameWidth: 32, frameBevelAlpha: 85, frameBevelWidth: 3, btnLabels: 'FRAMED' },
        axes: [{ label: 'frameWidth', key: 'frameWidth' }, { label: 'frameBevelAlpha', key: 'frameBevelAlpha' }, { label: 'material', literal: 'metal' }] },
      { name: 'Deep travel', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.rubber, pressDepthRatio: 45, wallHRatio: 35, btnLabels: 'DEEP' },
        axes: [{ label: 'pressDepthRatio', key: 'pressDepthRatio' }, { label: 'wallHRatio', key: 'wallHRatio' }, { label: 'material', literal: 'rubber' }] },
      { name: 'Shallow travel', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.metal, pressDepthRatio: 4, wallHRatio: 3, btnLabels: 'SHALLOW' },
        axes: [{ label: 'pressDepthRatio', key: 'pressDepthRatio' }, { label: 'wallHRatio', key: 'wallHRatio' }, { label: 'material', literal: 'metal' }] },

      // Row 6 — Specular & interaction mode (bg DARK for 21-22, NEUTRAL for 23-24).
      { name: 'Specular hot', bg: 'DARK',
        config: { ...MATERIAL_PRESETS.glass, specularAlpha: 80, specularSize: 90, lightAngleX: 30, lightAngleY: 15, btnLabels: 'SHINE' },
        axes: [{ label: 'specularAlpha', key: 'specularAlpha' }, { label: 'specularSize', key: 'specularSize' }, { label: 'material', literal: 'glass' }] },
      { name: 'Matte (no specular)', bg: 'DARK',
        config: { ...MATERIAL_PRESETS.rubber, specularAlpha: 0, contactIntensity: 0, btnLabels: 'MATTE' },
        axes: [{ label: 'specularAlpha', key: 'specularAlpha' }, { label: 'contactIntensity', key: 'contactIntensity' }, { label: 'material', literal: 'rubber' }] },
      { name: 'Toggle mode', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, mode: 'toggle', useToggleColor: true, toggleColor: '#4caf50', toggleHeightRatio: 60, btnLabels: 'TOGGLE' },
        axes: [{ label: 'mode', key: 'mode' }, { label: 'toggleColor', key: 'toggleColor' }, { label: 'toggleHeightRatio', key: 'toggleHeightRatio' }] },
      { name: 'Label-only, no icon', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.metal, btnCount: 3, btnLabels: 'PLAY,STOP,REC' },
        axes: [{ label: 'material', literal: 'metal' }, { label: 'count', key: 'btnCount' }, { label: 'icon', literal: 'none (pairs w/ #3)' }] },

      // Row 7 — Wave-3 shape primitives (bg NEUTRAL): skew (both axes, all
      // four directions + one combined — issue #40), per-corner radius,
      // segmented housing, and tri-state radio (issue #38). The
      // segmented/radio tiles render via buildClickyGroupHtml, never
      // buildClickyHtml (throws on housingLayout "segmented" — see lib
      // docblock) — buildTileMarkup() below dispatches on housingLayout.
      //
      // Skew v2 (issue #40): shear moved from `.btn-cell` to `.btn-housing`,
      // so the chrome frame/cavity now shears WITH the face — the whole
      // point of #40. Every skew tile below keeps its preset's frameEnabled:
      // true (plastic/metal both default it on) specifically so the sheared
      // housing chrome is visible, not just the face.
      { name: 'Skew X +12°', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, skewXAngle: 12, btnLabels: 'SKEW X+' },
        axes: [{ label: 'skewXAngle', key: 'skewXAngle' }, { label: 'frameEnabled', key: 'frameEnabled' }, { label: 'shape', literal: 'parallelogram (+X)' }] },
      { name: 'Skew X −12°', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, skewXAngle: -12, btnLabels: 'SKEW X-' },
        axes: [{ label: 'skewXAngle', key: 'skewXAngle' }, { label: 'frameEnabled', key: 'frameEnabled' }, { label: 'shape', literal: 'parallelogram (-X)' }] },
      { name: 'Skew Y +6°', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.metal, skewYAngle: 6, btnLabels: 'SKEW Y+' },
        axes: [{ label: 'skewYAngle', key: 'skewYAngle' }, { label: 'frameEnabled', key: 'frameEnabled' }, { label: 'shape', literal: 'parallelogram (+Y)' }] },
      { name: 'Skew Y −6°', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.metal, skewYAngle: -6, btnLabels: 'SKEW Y-' },
        axes: [{ label: 'skewYAngle', key: 'skewYAngle' }, { label: 'frameEnabled', key: 'frameEnabled' }, { label: 'shape', literal: 'parallelogram (-Y)' }] },
      { name: 'Skew combined X+8/Y+4', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, skewXAngle: 8, skewYAngle: 4, btnLabels: 'COMBO' },
        axes: [{ label: 'skewXAngle', key: 'skewXAngle' }, { label: 'skewYAngle', key: 'skewYAngle' }, { label: 'shape', literal: 'combined shear' }] },
      { name: 'Asymmetric corners', bg: 'NEUTRAL',
        config: { ...MATERIAL_PRESETS.plastic, radiusCorners: { tl: 0, tr: 50, br: 50, bl: 0 }, btnLabels: 'CORNERS' },
        axes: [{ label: 'radiusCorners', literal: 'sharp-left / pill-right' }, { label: 'material', literal: 'plastic' }, { label: 'shape', literal: 'asymmetric corners' }] },
      { name: 'Segmented', bg: 'NEUTRAL',
        config: { housingLayout: 'segmented', gridWrap: 'nowrap', groupLabel: 'Segmented view', btnCount: 3, btnLabels: 'List,Grid,Map' },
        axes: [{ label: 'housingLayout', key: 'housingLayout' }, { label: 'mode', key: 'mode' }, { label: 'count', key: 'btnCount' }] },
      { name: 'Tri-state (slicer)', bg: 'NEUTRAL',
        config: {
          housingLayout: 'segmented', mode: 'radio', gridWrap: 'nowrap',
          groupLabel: 'Slicer filter', btnCount: 3, btnLabels: 'TACIT,INCLUDE,EXCLUDE',
          variants: {
            include: { toggleColor: '#2e9e4f' },
            exclude: { toggleColor: '#c0392b' },
          },
        },
        groupOpts: { name: 'gallery-tristate', values: ['tacit', 'include', 'exclude'], checked: 'tacit' },
        axes: [{ label: 'housingLayout', key: 'housingLayout' }, { label: 'mode', key: 'mode' }, { label: 'toggleColor', literal: 'include #2e9e4f / exclude #c0392b' }] },
    ];

    // Caption axis {prefix} support (radiusRatio 50 style, per the designer's
    // "Pill" example) — folded into val()-driven formatting.
    function fmtAxis(cfg, a) {
      if ('literal' in a) return `${a.label}: ${a.literal}`;
      if (a.size) return `${a.label}: ${val(cfg, 'containerWidth')}×${val(cfg, 'containerHeight')}`;
      const v = val(cfg, a.key);
      return a.prefix ? `${a.label}: ${a.prefix}${v}` : `${a.label}: ${v}`;
    }

    function buildCaption(tile) {
      const parts = tile.axes.map(a => fmtAxis(tile.config, a));
      return `${tile.name} — ${parts.join(', ')}`;
    }

    // Builds the markup for one tile's button(s) using ONLY the public API.
    // housingLayout "segmented" (and its mode:"radio" tri-state variant,
    // issue #38) MUST go through buildClickyGroupHtml — buildClickyHtml
    // throws for those configs (a single button can't express a shared
    // segmented housing). Everything else keeps the pre-#38 path: call
    // buildClickyHtml once per label (via the same label-derivation the lib
    // uses internally) and wrap multi-button tiles in .btn-grid, matching
    // what buildGridCss() expects.
    function buildTileMarkup(tile) {
      const cfg = tile.config;
      if (cfg.housingLayout === 'segmented') {
        return buildClickyGroupHtml(cfg, tile.groupOpts || {});
      }
      const merged = { ...defaultClickyConfig, ...cfg };
      const labels = internals.getLabels(merged);
      // Icon-only buttons (empty label) require an accessible name.
      const buttons = labels.map(label => buildClickyHtml({
        label,
        config: cfg,
        attrs: label ? {} : { 'aria-label': merged.iconName || merged.btnLabels || 'button' },
      })).join('');
      return merged.btnCount > 1 ? `<div class="btn-grid">${buttons}</div>` : buttons;
    }

    // ── Generate ────────────────────────────────────────────────
    const grid = document.getElementById('gallery-grid');
    const cssChunks = [];
    const corrections = [];

    TILES.forEach((tile, i) => {
      const scope = `#tile-${i}`;
      let css;
      try {
        css = buildClickyCss(tile.config, { scope });
      } catch (err) {
        // Per the task contract: never silently drop a tile. If a bundle
        // ever throws, this is where a documented, minimal correction
        // would go (removing/fixing only the offending key) — logged so
        // it's visible rather than swallowed. All shipped bundles were
        // pre-verified not to hit this path (see verification step).
        console.error(`Tile ${i} (${tile.name}) failed validateClickyConfig:`, err.message);
        corrections.push({ tile: tile.name, error: err.message });
        return;
      }
      cssChunks.push(css);

      const el = document.createElement('div');
      el.className = 'gallery-tile';
      el.id = `tile-${i}`;
      el.style.background = BG[tile.bg];
      try {
        el.innerHTML = buildTileMarkup(tile);
      } catch (err) {
        // Fault-isolate per tile: one bad bundle must never take down the
        // page (a mid-loop throw would also skip the single style write).
        console.error(`Tile ${i} (${tile.name}) markup failed:`, err.message);
        corrections.push({ tile: tile.name, error: err.message });
        return;
      }

      const cap = document.createElement('div');
      cap.className = 'tile-caption';
      cap.textContent = buildCaption(tile);
      el.appendChild(cap);

      grid.appendChild(el);
    });

    // One concatenated <style>, not N — per mitigation (b)2 on issue #28.
    document.getElementById('gallery-css').textContent = cssChunks.join('\n');

    const rendered = TILES.length - corrections.length;
    document.getElementById('tile-count-note').textContent =
      corrections.length
        ? `${rendered}/${TILES.length} tiles rendered (${corrections.length} needed correction — see console)`
        : `${TILES.length} tiles — one variable isolated per row (material → shape → size → color → frame/travel → specular/mode → wave-3 shapes)`;
  </script>
</body>
</html>
